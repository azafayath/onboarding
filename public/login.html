<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onboarding Planning Portal</title>
  <style>
    :root {
      --navy-1: #08162d;
      --navy-2: #102c58;
      --navy-3: #1d4f93;
      --green-1: #6ba83a;
      --green-2: #8dc63f;
      --text-soft: #c9d7ee;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "DM Sans", Arial, sans-serif;
      background:
        linear-gradient(rgba(8, 22, 45, 0.68), rgba(16, 44, 88, 0.74)),
        url("/fip-wallpaper.jpg") center center / cover no-repeat fixed,
        radial-gradient(ellipse 90% 80% at 80% 15%, rgba(141, 198, 63, 0.16) 0%, transparent 60%),
        linear-gradient(145deg, var(--navy-1), var(--navy-2) 55%, var(--navy-3));
      color: #fff;
    }
    .card {
      width: min(460px, 92vw);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.11), rgba(255, 255, 255, 0.06));
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 18px;
      padding: 30px;
      backdrop-filter: blur(8px);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
    }
    .brand {
      display: inline-flex;
      align-items: center;
      border: 1px solid rgba(141, 198, 63, 0.35);
      color: #d8efb7;
      background: rgba(141, 198, 63, 0.14);
      border-radius: 999px;
      font-size: 11px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      font-weight: 700;
      padding: 6px 12px;
      margin-bottom: 14px;
    }
    h1 { margin: 0 0 8px; font-size: 29px; line-height: 1.15; }
    p { margin: 0 0 24px; color: var(--text-soft); font-size: 14px; }
    label {
      display: block;
      margin: 10px 0 6px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: #d7e4f8;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid rgba(163, 188, 226, 0.45);
      background: rgba(255, 255, 255, 0.95);
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 14px;
      outline: none;
    }
    input:focus {
      border-color: var(--green-2);
      box-shadow: 0 0 0 3px rgba(141, 198, 63, 0.2);
    }
    button {
      width: 100%;
      margin-top: 16px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--green-1), var(--green-2));
      color: #fff;
      padding: 11px 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: transform 0.15s ease, filter 0.15s ease;
    }
    button:hover {
      filter: brightness(1.06);
      transform: translateY(-1px);
    }
    .msg { margin-top: 12px; min-height: 18px; color: #ffb3b3; font-size: 13px; }
  </style>
</head>
<body>
  <form class="card" id="loginForm">
    <span class="brand">FIP x Almarai</span>
    <h1>Onboarding Planning Portal</h1>
    <p>Secure login for managers and administrators.</p>
    <label for="username">Username</label>
    <input id="username" name="username" required autocomplete="username">
    <label for="password">Password</label>
    <input id="password" name="password" type="password" required autocomplete="current-password">
    <button type="submit">Login</button>
    <div class="msg" id="msg"></div>
  </form>

  <script>
    async function checkSession() {
      const res = await fetch("/api/auth/me");
      const data = await res.json();
      if (data.user) window.location.href = "/planner.html";
    }
    checkSession();

    document.getElementById("loginForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const msg = document.getElementById("msg");
      msg.textContent = "";
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const res = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) {
        msg.textContent = data.error || "Login failed.";
        return;
      }
      window.location.href = "/planner.html";
    });
  </script>
</body>
</html>
