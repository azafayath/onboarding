<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onboarding Planning Portal</title>
  <link rel="icon" type="image/png" href="/fip-logo.png">
  <style>
    :root {
      --blue-1: #15294c;
      --blue-2: #274a7b;
      --blue-3: #335d99;
      --input-border: #d6dbe6;
      --muted: #7b8397;
      --text: #1d2433;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      background:
        linear-gradient(rgba(21, 41, 76, 0.77), rgba(39, 74, 123, 0.72)),
        url("/fip-wallpaper.jpg") center center / cover no-repeat fixed,
        radial-gradient(ellipse 90% 80% at 80% 15%, rgba(87, 125, 186, 0.25) 0%, transparent 60%),
        linear-gradient(145deg, var(--blue-1), var(--blue-2) 55%, var(--blue-3));
      color: var(--text);
      overflow: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(55% 45% at 15% 70%, rgba(81, 180, 203, 0.22) 0%, transparent 70%),
        radial-gradient(65% 50% at 80% 35%, rgba(122, 161, 219, 0.20) 0%, transparent 72%);
      pointer-events: none;
    }
    .card {
      position: relative;
      z-index: 1;
      width: min(390px, 92vw);
      background: #f7f8fb;
      border: 1px solid rgba(24, 48, 90, 0.1);
      border-radius: 12px;
      padding: 26px 18px 18px;
      box-shadow: 0 20px 36px rgba(6, 13, 28, 0.3);
    }
    .logo-wrap {
      text-align: center;
      margin-bottom: 12px;
    }
    .logo-wrap img {
      width: 82px;
      height: auto;
    }
    h1 {
      display: none;
    }
    label {
      display: block;
      margin: 11px 0 6px;
      font-size: 11px;
      color: #2a3347;
      font-weight: 500;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid var(--input-border);
      background: #fff;
      border-radius: 4px;
      padding: 9px 10px;
      font-size: 12px;
      outline: none;
      color: #1e2638;
    }
    input::placeholder { color: #a2a8b8; }
    input:focus {
      border-color: #7a90ba;
      box-shadow: 0 0 0 2px rgba(122, 144, 186, 0.14);
    }
    .password-wrap {
      position: relative;
    }
    .password-wrap input {
      padding-right: 48px;
    }
    .toggle-password {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: transparent;
      color: #4e5d7e;
      font-size: 11px;
      cursor: pointer;
      padding: 0;
      width: auto;
      margin: 0;
      font-weight: 500;
    }
    .submit-btn {
      width: 100%;
      margin-top: 14px;
      border: none;
      border-radius: 4px;
      background: #091735;
      color: #fff;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.1px;
      transition: transform 0.15s ease, filter 0.15s ease;
    }
    .submit-btn:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }
    .divider {
      margin: 12px 0;
      text-align: center;
      font-size: 10px;
      color: var(--muted);
      position: relative;
    }
    .divider::before,
    .divider::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 36%;
      height: 1px;
      background: #e3e7f0;
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
    .google-btn {
      width: 100%;
      border: 1px solid #d8ddea;
      border-radius: 4px;
      background: #fff;
      color: #47506a;
      padding: 9px 10px;
      font-size: 11px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
    }
    .google-icon {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: conic-gradient(#ea4335 0 25%, #fbbc05 25% 50%, #34a853 50% 75%, #4285f4 75% 100%);
    }
    .msg {
      margin-top: 10px;
      min-height: 16px;
      color: #bb2438;
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <form class="card" id="loginForm">
    <div class="logo-wrap">
      <img src="/fip-logo.png" alt="FIP logo">
    </div>
    <h1>Sign in</h1>
    <label for="username">Email</label>
    <input id="username" name="username" type="email" required autocomplete="username" placeholder="Enter your email">
    <label for="password">Password</label>
    <div class="password-wrap">
      <input id="password" name="password" type="password" required autocomplete="current-password" placeholder="Enter your password">
      <button type="button" class="toggle-password" id="togglePassword">Show</button>
    </div>
    <button class="submit-btn" type="submit">Sign in</button>
    <div class="divider">or continue with</div>
    <button class="google-btn" type="button">
      <span class="google-icon" aria-hidden="true"></span>
      Google
    </button>
    <div class="msg" id="msg"></div>
  </form>

  <script>
    async function checkSession() {
      const res = await fetch("/api/auth/me");
      const data = await res.json();
      if (data.user) window.location.href = "/planner.html";
    }
    checkSession();

    document.getElementById("togglePassword").addEventListener("click", () => {
      const password = document.getElementById("password");
      const toggle = document.getElementById("togglePassword");
      const isHidden = password.type === "password";
      password.type = isHidden ? "text" : "password";
      toggle.textContent = isHidden ? "Hide" : "Show";
    });

    document.getElementById("loginForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const msg = document.getElementById("msg");
      msg.textContent = "";
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const res = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) {
        msg.textContent = data.error || "Login failed.";
        return;
      }
      window.location.href = "/planner.html";
    });
  </script>
</body>
</html>
