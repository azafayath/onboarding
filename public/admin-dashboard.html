<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CEO Dashboard</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f4f7fb; color: #10213c; }
    .top { background: #0d2145; color: #fff; padding: 14px 22px; display: flex; justify-content: space-between; align-items: center; }
    .links a { color: #fff; text-decoration: none; margin-left: 12px; font-weight: 700; font-size: 14px; }
    .wrap { max-width: 1200px; margin: 20px auto; padding: 0 16px; }
    .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 14px; }
    .kpi { background: #fff; border: 1px solid #d5e0ef; border-radius: 12px; padding: 14px; }
    .kpi .label { font-size: 12px; color: #607b9f; text-transform: uppercase; letter-spacing: .4px; }
    .kpi .value { font-size: 30px; font-weight: 800; color: #0d2145; margin-top: 6px; }
    .card { background: #fff; border: 1px solid #d5e0ef; border-radius: 12px; padding: 14px; margin-bottom: 14px; }
    h2 { margin: 0 0 10px; font-size: 18px; }
    .bar-wrap { background: #e8effa; border-radius: 999px; overflow: hidden; height: 16px; margin-top: 8px; }
    .seg { height: 100%; float: left; }
    .seg.fip { background: #4a90c4; }
    .seg.almarai { background: #1b3a6b; }
    .seg.field { background: #c27c0a; }
    .legend { margin-top: 8px; font-size: 13px; color: #304f77; display: flex; gap: 16px; flex-wrap: wrap; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border-bottom: 1px solid #e3ebf7; padding: 9px 8px; text-align: left; font-size: 13px; }
    th { color: #5f7899; text-transform: uppercase; font-size: 11px; letter-spacing: .4px; }
    .muted { color: #8aa0bc; }
  </style>
</head>
<body>
  <div class="top">
    <strong>CEO Dashboard - Onboarding Analytics</strong>
    <div class="links">
      <a href="/planner.html">Planner</a>
      <a href="/admin-users.html">Manage Users</a>
    </div>
  </div>

  <div class="wrap">
    <div class="kpi-grid">
      <div class="kpi"><div class="label">Active Users</div><div class="value" id="kUsers">0</div></div>
      <div class="kpi"><div class="label">Plans Started</div><div class="value" id="kStarted">0</div></div>
      <div class="kpi"><div class="label">Total Assigned Topics</div><div class="value" id="kAssigned">0</div></div>
      <div class="kpi"><div class="label">Total Assigned CTH</div><div class="value" id="kHours">0</div></div>
    </div>

    <div class="card">
      <h2>Delivery Point Distribution</h2>
      <div class="bar-wrap">
        <div class="seg fip" id="segFip" style="width:0%"></div>
        <div class="seg almarai" id="segAlmarai" style="width:0%"></div>
        <div class="seg field" id="segField" style="width:0%"></div>
      </div>
      <div class="legend">
        <span id="lFip">FIP: 0%</span>
        <span id="lAlmarai">Almarai: 0%</span>
        <span id="lField">Field: 0%</span>
      </div>
    </div>

    <div class="card">
      <h2>Line Manager Status</h2>
      <table>
        <thead>
          <tr>
            <th>User</th>
            <th>Manager Name</th>
            <th>Designation</th>
            <th>Region</th>
            <th>Date</th>
            <th>Assigned Topics</th>
            <th>Assigned CTH</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const TOTAL_TOPICS = 73;
    const cthByIdx = {
      0:2,1:2,2:2,3:2,4:4,5:6,6:6,7:10,8:10,9:8,10:10,11:8,12:6,13:6,14:6,15:8,16:8,17:4,18:0,19:0,20:2,21:2,22:2,23:8,24:6,25:4,26:12,27:6,28:6,29:10,30:12,31:12,32:8,33:4,34:6,35:8,36:8,37:6,38:8,39:8,40:4,41:6,42:10,43:10,44:8,45:8,46:10,47:6,48:6,49:5,50:6,51:5,52:5,53:5,54:5,55:5,56:6,57:3,58:4,59:2,60:8,61:4,62:4,63:2,64:6,65:2,66:2,67:6,68:4,69:4,70:8,71:24,72:2
    };

    function byId(id) { return document.getElementById(id); }
    async function api(path) {
      const res = await fetch(path);
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || "Request failed");
      return data;
    }

    async function init() {
      const me = await api("/api/auth/me");
      if (!me.user) return window.location.href = "/login.html";
      if (me.user.role !== "admin") return window.location.href = "/planner.html";

      const [usersData, reportData] = await Promise.all([
        api("/api/admin/users"),
        api("/api/report")
      ]);

      const activeUsers = usersData.users.filter(u => u.is_active === 1 && u.role === "user");
      let totalAssigned = 0, totalHours = 0, started = 0;
      let fip = 0, almarai = 0, field = 0;

      const byIdMap = new Map(reportData.report.map(r => [r.user.id, r]));
      const rows = activeUsers.map((u) => {
        const rec = byIdMap.get(u.id);
        const profile = rec?.profile || {};
        const sels = rec?.selections || [];
        const assigned = sels.length;
        const cth = sels.reduce((sum, r) => sum + (cthByIdx[r.row_idx] || 0), 0);
        if (assigned > 0) started += 1;
        totalAssigned += assigned;
        totalHours += cth;
        sels.forEach((r) => {
          if (r.delivery_point === "FIP") fip += (cthByIdx[r.row_idx] || 0);
          else if (r.delivery_point === "Almarai") almarai += (cthByIdx[r.row_idx] || 0);
          else field += (cthByIdx[r.row_idx] || 0);
        });

        return `
          <tr>
            <td>${u.display_name || u.username} <span class="muted">(${u.username})</span></td>
            <td>${profile.name || "-"}</td>
            <td>${profile.desig || "-"}</td>
            <td>${profile.region || "-"}</td>
            <td>${profile.date || "-"}</td>
            <td>${assigned} / ${TOTAL_TOPICS}</td>
            <td>${cth}</td>
          </tr>
        `;
      });

      byId("kUsers").textContent = activeUsers.length;
      byId("kStarted").textContent = started;
      byId("kAssigned").textContent = totalAssigned;
      byId("kHours").textContent = totalHours;
      byId("tbody").innerHTML = rows.join("") || "<tr><td colspan='7'>No active user records.</td></tr>";

      const totalDist = fip + almarai + field;
      const pF = totalDist ? Math.round((fip / totalDist) * 100) : 0;
      const pA = totalDist ? Math.round((almarai / totalDist) * 100) : 0;
      const pFi = totalDist ? 100 - pF - pA : 0;
      byId("segFip").style.width = pF + "%";
      byId("segAlmarai").style.width = pA + "%";
      byId("segField").style.width = pFi + "%";
      byId("lFip").textContent = `FIP: ${pF}% (${fip} CTH)`;
      byId("lAlmarai").textContent = `Almarai: ${pA}% (${almarai} CTH)`;
      byId("lField").textContent = `Field: ${pFi}% (${field} CTH)`;
    }
    init().catch((err) => alert(err.message));
  </script>
</body>
</html>
